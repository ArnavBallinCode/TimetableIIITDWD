name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Static verification checks
        run: python -m compileall timetable_automation tests
      - name: Run black-box and white-box scheduler tests
        working-directory: tests
        run: |
          python -m pytest -q test_scheduling_logic.py -m "blackbox or whitebox" \
            --cov=../timetable_automation --cov-branch --cov-report=term-missing:skip-covered \
            --cov-fail-under=1
      - name: Run integration and regression tests
        working-directory: tests
        run: python -m pytest -q -m "integration or regression"
